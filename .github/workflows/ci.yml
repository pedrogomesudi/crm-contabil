name: CI

on:
  # develop também: é onde o trabalho acontece. Verificar só no push para main
  # significa descobrir a quebra no merge, quando o estrago já está no histórico.
  push:
    branches: [main, develop]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # build antes do typecheck: gera next-env.d.ts e .next/types (necessários ao tsc)
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      - run: npm run typecheck
      - run: npm test
