name: Backup diário (dump redundante para o Backblaze)

# 24/7 na infra do GitHub — não depende de nenhuma máquina ligada.
# 09:00 America/Sao_Paulo = 12:00 UTC.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {} # permite disparar à mão para testar

# Um backup por vez.
concurrency:
  group: backup-gomes
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # pg_dump recente (>= o servidor). O client do runner pode ser antigo; instala o 17 do PGDG.
      - name: Instalar pg_dump (PostgreSQL client 17)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Rodar o backup
        env:
          # SSL COM verificação do certificado do servidor (verify-full): criptografa E
          # confirma que o banco é o Supabase de verdade, contra man-in-the-middle. O dump
          # carrega todos os dados de cliente — `require` (só criptografia, sem verificar a
          # identidade) seria fraco demais. A CA fixada vem do repositório (checkout acima).
          PGSSLMODE: verify-full
          PGSSLROOTCERT: ${{ github.workspace }}/supabase/db-ca.crt
          # Segredos — cadastrados em Settings → Secrets and variables → Actions.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_S3_KEY_ID: ${{ secrets.BACKUP_S3_KEY_ID }}
          BACKUP_S3_SECRET: ${{ secrets.BACKUP_S3_SECRET }}
          # Identificadores (não sensíveis) — variables do repositório.
          BACKUP_S3_ENDPOINT: ${{ vars.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_REGION: ${{ vars.BACKUP_S3_REGION }}
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
        run: node scripts/backup-dump.mjs --slug gomes
